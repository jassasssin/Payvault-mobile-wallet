# ─── Secrets – Sensitive values (base64 encoded) ─────────────────────────────
# NOTE: In production, use HashiCorp Vault + vault-agent-injector instead.
# These are base64 of placeholder values — replace before deploying.
#
# To encode:  echo -n 'your-secret' | base64
# To decode:  echo 'encoded' | base64 --decode

apiVersion: v1
kind: Secret
metadata:
  name: wallet-secrets
  namespace: wallet
  annotations:
    # Vault injection annotation (if using Vault agent sidecar)
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "wallet-app"
    vault.hashicorp.com/agent-inject-secret-jwt: "secret/wallet/jwt"
type: Opaque
data:
  # base64 of: wallet-production-jwt-secret-key-change-me
  JWT_SECRET: d2FsbGV0LXByb2R1Y3Rpb24tand0LXNlY3JldC1rZXktY2hhbmdlLW1l
